services:
  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  app:
    image: compuguessr
    environment:
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
    depends_on:
      valkey:
        condition: service_healthy

  tester:
    image: python:3.11-slim
    volumes:
      - ../../../test:/test
    environment:
      - VALKEY_HOST=valkey
      - APP_HOST=app
    depends_on:
      - app
    command: >
      sh -c "pip install pytest redis requests &&
             pytest /test/integration -v"
